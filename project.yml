name: DefaultTamer
options:
  bundleIdPrefix: com.defaulttamer
  deploymentTarget:
    macOS: 13.0
packages:
  SQLite:
    url: https://github.com/stephencelis/SQLite.swift
    from: 0.15.3
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: 2.6.0
targets:
  DefaultTamer:
    type: application
    platform: macOS
    deploymentTarget: 13.0
    info:
      path: DefaultTamer/Info.plist
      properties:
        CFBundleIdentifier: com.defaulttamer.app
        CFBundleName: $(PRODUCT_NAME)
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        LSMinimumSystemVersion: $(MACOSX_DEPLOYMENT_TARGET)
        LSUIElement: true
        CFBundleSignature: "DfTm"
        NSUserActivityTypes:
          - NSUserActivityTypeBrowsingWeb
        NSHighResolutionCapable: true
        SUFeedURL: https://www.defaulttamer.app/appcast.xml
        SUEnableAutomaticChecks: true
        SUPublicEDKey: 9W8teKdnj8NLMfjgwZIy1jv/cR4SytXzdLyY8hRA5sY=
        CFBundleDocumentTypes:
          - CFBundleTypeName: HTML Document
            CFBundleTypeRole: Viewer
            CFBundleTypeExtensions:
              - html
              - htm
              - shtml
              - xhtml
              - shtm
              - xhtm
        CFBundleURLTypes:
          - CFBundleURLName: HTTP
            CFBundleURLSchemes:
              - http
          - CFBundleURLName: HTTPS
            CFBundleURLSchemes:
              - https
    sources:
      - DefaultTamer
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.defaulttamer.app
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        MACOSX_DEPLOYMENT_TARGET: 13.0
        SWIFT_VERSION: 5.9
        ENABLE_HARDENED_RUNTIME: YES
        COMBINE_HIDPI_IMAGES: YES
        CODE_SIGN_ENTITLEMENTS: DefaultTamer/DefaultTamer.entitlements
        DEVELOPMENT_TEAM: BZ2JB93F6F
        CODE_SIGNING_REQUIRED: YES
        CODE_SIGNING_ALLOWED: YES
        MARKETING_VERSION: "0.0.1"
        CURRENT_PROJECT_VERSION: "1"
      configs:
        Debug:
          CODE_SIGN_IDENTITY: "Apple Development"
          CODE_SIGN_STYLE: Automatic
        Release:
          CODE_SIGN_IDENTITY: "Developer ID Application"
          CODE_SIGN_STYLE: Manual
    dependencies:
      - package: SQLite
        product: SQLite
      - package: Sparkle
        product: Sparkle
  DefaultTamerTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: 13.0
    sources:
      - DefaultTamerTests
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.defaulttamer.app.tests
      SWIFT_VERSION: 5.9
      GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: DefaultTamer
      - package: SQLite
        product: SQLite
