name: Build and Test

on:
  push:
    branches: [trunk, main]
    paths-ignore:
      - '**.md'
      - 'DefaultTamerWeb/**'
      - '.github/workflows/release.yml'
      - 'LICENSE'
      - 'VERSION.txt'
  pull_request:
    branches: [trunk, main]
    paths-ignore:
      - '**.md'
      - 'DefaultTamerWeb/**'
      - '.github/workflows/release.yml'
      - 'LICENSE'
      - 'VERSION.txt'

jobs:
  build:
    name: Build and Test
    runs-on: macos-15
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "16"

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build
        run: |
          xcodebuild -project DefaultTamer.xcodeproj \
            -scheme DefaultTamer \
            -configuration Debug \
            -destination 'platform=macOS' \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Run tests
        run: |
          xcodebuild test \
            -project DefaultTamer.xcodeproj \
            -scheme DefaultTamer \
            -destination 'platform=macOS' \
            -enableCodeCoverage YES \
            CODE_SIGNING_ALLOWED=NO
        continue-on-error: true

      - name: Archive build artifacts
        if: success()
        uses: actions/upload-artifact@v7
        with:
          name: DefaultTamer-Debug
          path: |
            ~/Library/Developer/Xcode/DerivedData/**/Build/Products/Debug/DefaultTamer.app
          retention-days: 7
